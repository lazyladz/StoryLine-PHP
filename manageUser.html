<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fb;
    }
    .sidebar {
      min-height: 100vh;
      background-color: #0d1321;
      color: #fff;
    }
    .sidebar a {
      color: #adb5bd;
      text-decoration: none;
      display: block;
      padding: .75rem 1rem;
      border-radius: .375rem;
    }
    .sidebar a:hover {
      background-color: #1c2333;
      color: #fff;
    }
    tr { cursor: pointer; }
  </style>
</head>

<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
      <h4 class="text-white">StoryLine</h4>
      <ul class="nav flex-column mt-4">
        <li class="nav-item"><a href="index.html" class="nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="manageUser.html" class="nav-link active text-white">Manage Users</a></li>
        <li class="nav-item"><a href="#" class="nav-link">Manage Stories</a></li>
        <li class="nav-item"><a href="#" class="nav-link">Notifications</a></li>
        <li class="nav-item"><a href="#" class="nav-link">Settings</a></li>
        <li class="nav-item"><a href="#" class="nav-link">Log Out</a></li>
      </ul>

      <div class="mt-auto pt-3">
        <!-- Button trigger modal -->
        <button type="button" class="btn btn-outline-light w-100" data-bs-toggle="modal" data-bs-target="#userProfileModal">
          <strong>Olivia Rhye</strong><br>
          <small>olivia@untitledui.com</small>
        </button>
      </div>
      </nav>
      
      <!-- User Profile Modal -->
      <div class="modal fade" id="userProfileModal" tabindex="-1" aria-labelledby="userProfileLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="userProfileLabel">User Profile</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center">
              <img src="https://via.placeholder.com/100" class="rounded-circle mb-3" alt="Profile Picture">
              <h5>Olivia Rhye</h5>
              <p class="text-muted">olivia@untitledui.com</p>
              <hr>
              <p><strong>Role:</strong> Admin</p>
              <p><strong>Joined:</strong> January 2024</p>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              <button type="button" class="btn btn-primary">Edit Profile</button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    

    <!-- User Detail Modal -->
<div class="modal fade" id="userDetailModal" tabindex="-1" aria-labelledby="userDetailLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold text-primary" id="userDetailLabel">👤 User Information</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      
      <div class="modal-body">
        <div class="text-center mb-4">
          <img src="https://via.placeholder.com/120" class="rounded-circle shadow-sm border" alt="Profile Picture">
          <h4 class="mt-3 fw-bold" id="modalName"></h4>
          <p class="text-muted mb-1" id="modalEmail"></p>
        </div>
        
        <div class="row text-center g-3">
          <div class="col-md-6">
            <div class="p-3 bg-light rounded-3 shadow-sm h-100">
              <h6 class="text-secondary mb-1">Stories Uploaded</h6>
              <h4 class="fw-bold text-dark" id="modalStories"></h4>
            </div>
          </div>
          <div class="col-md-6">
            <div class="p-3 bg-light rounded-3 shadow-sm h-100">
              <h6 class="text-secondary mb-1">Joined</h6>
              <h4 class="fw-bold text-dark" id="modalJoined"></h4>
            </div>
          </div>
        </div>
      </div>
      
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary rounded-pill px-4">Manage User</button>
      </div>
    </div>
  </div>
</div>


    <!-- Main Content -->
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <h2 class="mb-4">Manage Users</h2>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped table-bordered">
              <thead class="table-dark">
                <tr>
                  <th>ID No.</th>
                  <th>First Name</th>
                  <th>Last Name</th>
                  <th>Email</th>
                </tr>
              </thead>
              <tbody id="userTable">
                <!-- Filled by JS -->
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <nav>
            <ul class="pagination justify-content-center" id="pagination">
              <!-- Filled by JS -->
            </ul>
          </nav>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
// Sample names
const firstNames = ["Olivia", "Liam", "Emma", "Noah", "Ava", "Elijah", "Sophia", "Lucas", "Mia", "Amelia"];
const lastNames = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis"];
const domains = ["example.com", "mail.com", "test.org", "demo.net"];

// Random helper
function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// Generate fake users
const users = [];
for (let i = 1; i <= 50; i++) {
  const firstName = getRandom(firstNames);
  const lastName = getRandom(lastNames);
  const email = `${firstName.toLowerCase()}.${lastName.toLowerCase()}${i}@${getRandom(domains)}`;
  const stories = Math.floor(Math.random() * 30); // random stories uploaded
  const joinedDate = `202${Math.floor(Math.random()*5)}-0${Math.floor(Math.random()*9)+1}-15`;

  users.push({
    id: i,
    firstName,
    lastName,
    email,
    stories,
    joined: joinedDate
  });
}

const rowsPerPage = 15;
let currentPage = 1;

function displayTable(page) {
  const table = document.getElementById("userTable");
  table.innerHTML = "";

  const start = (page - 1) * rowsPerPage;
  const end = start + rowsPerPage;
  const paginatedUsers = users.slice(start, end);

  paginatedUsers.forEach(user => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${user.id}</td>
      <td>${user.firstName}</td>
      <td>${user.lastName}</td>
      <td>${user.email}</td>
    `;
    row.addEventListener("click", () => showUserDetail(user));
    table.appendChild(row);
  });
}

function setupPagination() {
  const pageCount = Math.ceil(users.length / rowsPerPage);
  const pagination = document.getElementById("pagination");
  pagination.innerHTML = "";

  for (let i = 1; i <= pageCount; i++) {
    pagination.innerHTML += `
      <li class="page-item ${i === currentPage ? "active" : ""}">
        <a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
      </li>`;
  }
}

function changePage(page) {
  currentPage = page;
  displayTable(page);
  setupPagination();
}

// Show user detail modal
function showUserDetail(user) {
  document.getElementById("modalName").innerText = `${user.firstName} ${user.lastName}`;
  document.getElementById("modalEmail").innerText = user.email;
  document.getElementById("modalStories").innerText = user.stories;
  document.getElementById("modalJoined").innerText = user.joined;
  new bootstrap.Modal(document.getElementById("userDetailModal")).show();
}

// Initial load
displayTable(currentPage);
setupPagination();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
